<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Paisa-Trakrrrr</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0A0A0A] text-[#EDEDED] antialiased min-h-screen pb-20 selection:bg-white/20">

    <div class="max-w-md mx-auto px-5 pt-10 space-y-6">
        
        <header class="mb-10">
            <p class="text-[#A1A1AA] text-sm font-medium tracking-wide uppercase mb-2">Total Balance</p>
            <h1 class="text-6xl font-bold tracking-tighter flex items-center gap-1 font-mono">
                <span class="text-[#666666] text-4xl">₹</span><span id="totalDisplay">0</span>
            </h1>
        </header>

        <section>
            <div class="grid grid-cols-4 gap-3" id="quickLogGrid">
                </div>
        </section>

        <section class="glass-card p-1 flex gap-2 items-center rounded-2xl relative z-10 focus-within:ring-1 focus-within:ring-white/20 transition-all">
            <div class="relative flex-1">
                <i class="ph ph-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-[#666666]"></i>
                <input type="text" id="descInput" placeholder="Log an expense..." class="w-full bg-transparent text-sm px-10 py-3 text-white placeholder-[#666666] focus:outline-none">
            </div>
            <input type="number" id="amountInput" placeholder="₹ 0" class="w-20 bg-transparent text-sm py-3 text-white placeholder-[#666666] focus:outline-none font-mono">
            <button onclick="addManualExpense()" class="bg-white text-black p-3 rounded-xl hover:bg-gray-200 transition-transform active:scale-95">
                <i class="ph ph-arrow-right font-bold"></i>
            </button>
        </section>

        <select id="categoryInput" class="w-full bg-[#111] border border-[#222] rounded-xl px-4 py-3 text-sm text-[#A1A1AA] focus:outline-none appearance-none mt-2">
            </select>

        <section class="pt-6">
            <h3 class="text-[#666666] text-xs font-semibold uppercase tracking-widest mb-4">Recent Transactions</h3>
            <div id="expenseList" class="space-y-1">
                </div>
        </section>

    </div>

    <script src="app.js"></script>
</body>
</html>
